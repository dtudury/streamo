<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>streamo · chat-edit</title>
  <style>
    :root {
      --fg: #1f2330; --fg-soft: #4a5060; --fg-mute: #8a909e;
      --bg: #fafafa; --bg-panel: #ffffff;
      --line: #e4e6eb; --accent: #2858a3; --accent-soft: #eaf3ff;
      --good: #1d8a4a; --warn: #d97706;
    }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; color: var(--fg); background: var(--bg); }
    body { display: flex; flex-direction: column; }

    header {
      display: flex; gap: 1rem; align-items: baseline;
      padding: 0.5rem 1rem; border-bottom: 1px solid var(--line);
      background: var(--bg-panel); font-size: 0.85rem; color: var(--fg-soft);
    }
    header .brand { font-weight: 600; color: var(--fg); }
    header .sub   { color: var(--fg-mute); font-size: 0.75rem; font-family: ui-monospace, Menlo, monospace; }
    header .who {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.15rem 0.55rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 600;
    }
    header .who.author { background: #dff3e2; color: #1d6a37; }
    header .who.read   { background: #fdeede; color: #b35b00; }
    header .who.none   { background: #f0f1f4; color: var(--fg-mute); }
    header .who .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
    header .logout {
      background: transparent; border: 1px solid var(--line); color: var(--fg-soft);
      padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.72rem; cursor: pointer;
    }
    header .logout:hover { border-color: var(--accent); color: var(--accent); }
    header .status { margin-left: auto; color: var(--fg-mute); font-family: ui-monospace, Menlo, monospace; font-size: 0.72rem; }

    main { flex: 1; display: flex; flex-direction: column; padding: 1.5rem 2rem; max-width: 56rem; box-sizing: border-box; gap: 1.5rem; }

    .login { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem; }
    .login h1 { font-weight: 500; font-size: 1.6rem; margin: 0; }
    .login p  { color: var(--fg-mute); font-size: 0.9rem; max-width: 32rem; text-align: center; margin: 0; }
    .login form { display: flex; flex-direction: column; gap: 0.6rem; width: 22rem; }
    .login label { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.8rem; color: var(--fg-soft); }
    .login input { border: 1px solid var(--line); padding: 0.5rem 0.7rem; border-radius: 4px; font-family: ui-monospace, Menlo, monospace; font-size: 0.85rem; outline: none; }
    .login input:focus { border-color: var(--accent); }
    .login button { padding: 0.55rem; background: var(--accent); color: #fff; border: 0; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .login button:disabled { background: #aab; cursor: not-allowed; }
    .login .error { color: #b03030; font-size: 0.8rem; min-height: 1.2em; }

    .field-card {
      background: var(--bg-panel); border: 1px solid var(--line); border-radius: 6px; padding: 1rem 1.2rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .field-card .field-name { font-family: ui-monospace, Menlo, monospace; font-size: 0.75rem; color: var(--fg-mute); }
    .field-card .field-current { font-size: 1.05rem; line-height: 1.55; color: var(--fg); }
    .field-card .field-empty { color: var(--fg-mute); font-style: italic; }
    .field-card .prose-value { white-space: pre-wrap; }
    .field-card .list-value { margin: 0; padding-left: 1.4rem; }
    .field-card .list-value li { margin: 0.25rem 0; line-height: 1.5; }
    .suggestion .list-value { margin: 0; padding-left: 1.4rem; }
    .suggestion .list-value li { margin: 0.25rem 0; line-height: 1.5; }

    .suggestion {
      background: var(--accent-soft); border: 1px solid #bcd4f0; border-radius: 6px; padding: 0.8rem 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .suggestion .from { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .suggestion .proposed { font-size: 1.05rem; line-height: 1.55; color: var(--fg); white-space: pre-wrap; }
    .suggestion .reason { font-size: 0.85rem; color: var(--fg-soft); font-style: italic; }
    .suggestion .row { display: flex; gap: 0.6rem; }
    .suggestion button {
      padding: 0.45rem 1.1rem; border-radius: 4px; border: 0; cursor: pointer; font-size: 0.85rem;
    }
    .suggestion button.accept { background: var(--good); color: #fff; }
    .suggestion button.dismiss { background: transparent; border: 1px solid var(--line); color: var(--fg-soft); }
    .suggestion button:disabled { background: #aab; cursor: not-allowed; }

    .empty-suggestion { color: var(--fg-mute); font-size: 0.85rem; font-style: italic; padding: 0.6rem 0; }
    .hint { color: var(--fg-mute); font-size: 0.8rem; padding: 0.4rem 0; }
  </style>
</head>
<body>
  <script type="module" src="./main.js"></script>
</body>
</html>
