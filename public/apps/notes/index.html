<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>streamo · notes</title>
  <link rel="icon" type="image/svg+xml" href="/streamo.svg">
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; }
    body { display: flex; flex-direction: column; background: #fafafa; }
    header { padding: 0.6rem 1rem; border-bottom: 1px solid #e5e5e5; background: #fff; font-size: 0.9rem; color: #666; }
    header strong { color: #333; }
    #editor { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; box-sizing: border-box; display: flex; }
    #editor textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #222;
    }
    #loading { text-align: center; color: #888; padding: 3rem; }
  </style>
</head>
<body>
  <header><strong>streamo · notes</strong> &nbsp; <span style="color:#aaa">v0 — plain textarea, smart surfaces coming</span></header>
  <p id="loading">loading notes…</p>
  <div id="editor"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
